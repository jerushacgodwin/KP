

services:
  mysql:
    image: mysql:8.0
    container_name: kp-mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-sms_2_0}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: kp-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: kp-phpmyadmin
    restart: always
    environment:
      PMA_HOST: host.docker.internal
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "8080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    command: npm run start
    restart: always
    environment:
      - PORT=4000
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - DB_NAME=${DB_NAME:-sms_2_0}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-supersecretkey}
    ports:
      - "4001:4000"
    depends_on:
      - mysql
      - redis
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/server/node_modules
    networks:
      - app-network

  application:
    build:
      context: .
      dockerfile: application/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    command: npm run dev
    restart: always
    environment:
      API_URL: "http://server:4000"
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:4001}"
    ports:
      - "3000:3000"
    depends_on:
      - server
    volumes:
      - .:/app
      - /app/node_modules
      - /app/application/.next
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
